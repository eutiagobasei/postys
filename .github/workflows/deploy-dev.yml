name: Deploy to Development

on:
  push:
    branches: [develop]

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST_DEV }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 60s
          command_timeout: 45m
          script: |
            set -e
            echo "=== Deploying postiz-app to DEV ==="

            cd /root/postiz-app || exit 1
            git fetch origin
            git checkout develop
            git stash || true
            git pull origin develop
            git stash pop || true

            # Build local image
            echo "=== Building Docker image ==="
            docker build -t localhost/postys -f Dockerfile.dev .

            # Start infrastructure services (postgres, redis, temporal)
            docker compose -f docker-compose.dev.yaml up -d

            # Get the network name created by docker-compose
            NETWORK_NAME=$(docker network ls --filter "name=postys-network" --format "{{.Name}}" | head -1)
            echo "Using network: $NETWORK_NAME"

            # Run the app
            docker stop postys || true
            docker rm postys || true
            # Stop any service using port 80
            echo "=== Stopping containers using port 80 ==="
            for cid in $(docker ps -q); do
              if docker port "$cid" 2>/dev/null | grep -q ":80->"; then
                echo "Stopping container $cid"
                docker stop "$cid" || true
              fi
            done
            # Also kill any process on port 80
            fuser -k 80/tcp 2>/dev/null || true

            docker run -d --name postys \
              --network "$NETWORK_NAME" \
              -p 80:4200 \
              -p 3000:3000 \
              -e DATABASE_URL="postgresql://postys-local:postys-local-pwd@postys-postgres:5432/postys-db-local" \
              -e REDIS_URL="redis://postys-redis:6379" \
              -e TEMPORAL_ADDRESS="temporal:7233" \
              -e JWT_SECRET="postys-dev-jwt-secret-change-in-prod" \
              -e IS_GENERAL="true" \
              -e NOT_SECURED="true" \
              -e FRONTEND_URL="http://potis.lytos.io" \
              -e NEXT_PUBLIC_BACKEND_URL="http://potis.lytos.io:3000" \
              -e BACKEND_INTERNAL_URL="http://localhost:3000" \
              localhost/postys

            # Wait for container to start
            sleep 5

            # Debug: Check container status
            echo "=== Container Status ==="
            docker ps -a | grep postys || echo "Container not found"

            # Debug: Check container logs
            echo "=== Container Logs (last 30 lines) ==="
            docker logs postys --tail 30 2>&1 || echo "No logs available"

            # Debug: Check if ports are listening
            echo "=== Port Status ==="
            netstat -tlnp 2>/dev/null | grep -E ":80|:3000" || ss -tlnp | grep -E ":80|:3000" || echo "Ports not listening"

            # Debug: Open firewall ports (if ufw is installed)
            echo "=== Opening firewall ports ==="
            ufw allow 80/tcp 2>/dev/null || echo "UFW not available or already open"
            ufw allow 3000/tcp 2>/dev/null || echo "UFW not available or already open"

            # Debug: Test local connectivity
            echo "=== Testing local connectivity ==="
            curl -s -o /dev/null -w "%{http_code}" http://localhost:80 || echo "Frontend not responding"
            curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 || echo "Backend not responding"

            echo "=== Deploy DEV concluído! ==="
